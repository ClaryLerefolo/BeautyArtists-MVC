name: Build and deploy ASP.Net Core app to Azure Web App - BeautyInRedAndGold

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PUBLISH_DIR: './publish'   # consistent output folder

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Publish with dotnet
        run: dotnet publish -c Release -o ${{ env.PUBLISH_DIR }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ${{ env.PUBLISH_DIR }}   # extract into the same folder

      # Optional: list files for debugging
      - name: List published files
        run: ls -la ${{ env.PUBLISH_DIR }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7929F1C593984B17B86C60BAA6A7065A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CD242FFABD4B49E38449BA8160DF38FB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AFF3B4D01D934DE7BFACEC155C893EA1 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'BeautyInRedAndGold'
          slot-name: 'Production'
          package: ${{ env.PUBLISH_DIR }}   # now points to the extracted folder
